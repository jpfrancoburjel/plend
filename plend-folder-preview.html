<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>plend</title>
  <style>
    :root {
      --bg: #1f1f1f;
      --panel: #252525;
      --line: #343434;
      --text: #f1f1f1;
      --muted: #cfcfcf;
      --folder: #f5c96a;
      --folder-dark: #d8aa42;
    }
    html, body {
      margin: 0;
      background: #111;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .window {
      width: 720px;
      margin: 0 auto;
      background: var(--bg);
      color: var(--text);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.45);
    }
    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 0 22px;
      font-weight: 700;
      font-size: 20px;
      border-bottom: 1px solid #2d2d2d;
    }
    .chev {
      color: #dadada;
      font-size: 40px;
      line-height: 1;
      font-weight: 300;
      opacity: .9;
      margin-top: -4px;
    }
    .title { letter-spacing: .2px; }
    .table {
      padding: 12px 18px 22px 18px;
      background: var(--panel);
      min-height: 430px;
    }
    .header {
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      padding: 0 14px 10px 38px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 8px;
    }
    .row {
      display: flex;
      align-items: center;
      height: 34px;
      padding: 0 10px;
      border-radius: 7px;
      font-size: 15px;
      color: #efefef;
    }
    .row:nth-child(3) { background: #3b3b3b; }
    .icon {
      width: 18px;
      height: 22px;
      margin-right: 12px;
      border-radius: 3px;
      background: linear-gradient(180deg, #f6f6f6 0%, #d8d8d8 100%);
      position: relative;
      flex: 0 0 auto;
    }
    .icon:before {
      content: "";
      position: absolute;
      right: 0;
      top: 0;
      width: 7px;
      height: 7px;
      background: #f0f0f0;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }
    .icon:after {
      content: "";
      position: absolute;
      left: 4px;
      top: 8px;
      width: 10px;
      height: 2px;
      background: #6aa7ff;
      box-shadow: 0 4px 0 #6aa7ff, 0 8px 0 #6aa7ff;
      opacity: .8;
    }
    .folder-icon {
      width: 20px;
      height: 15px;
      margin-right: 12px;
      position: relative;
      flex: 0 0 auto;
      background: linear-gradient(180deg, var(--folder) 0%, var(--folder-dark) 100%);
      border-radius: 3px;
    }
    .folder-icon:before {
      content: "";
      position: absolute;
      left: 2px;
      top: -4px;
      width: 10px;
      height: 6px;
      background: var(--folder);
      border-radius: 3px 3px 0 0;
    }
    .name { white-space: nowrap; }
    .footer-space {
      height: 36px;
      margin: 10px 10px 0;
      border-radius: 6px;
      background: #2b2b2b;
      opacity: .8;
    }
  </style>
</head>
<body>
  <div class="window">
    <div class="topbar">
      <div class="chev">‹</div>
      <div class="chev">›</div>
      <div class="title">plend</div>
    </div>
    <div class="table">
      <div class="header">Name</div>
      <div class="row"><div class="folder-icon"></div><div class="name">docs/strategy</div></div>
      <div class="row"><div class="folder-icon"></div><div class="name">docs/finance</div></div>
      <div class="row"><div class="folder-icon"></div><div class="name">docs/launch</div></div>
      <div class="row"><div class="folder-icon"></div><div class="name">docs/marketing</div></div>
      <div class="row"><div class="folder-icon"></div><div class="name">docs/product</div></div>
      <div class="row"><div class="icon"></div><div class="name">plend-folder-preview.html</div></div>
      <div class="row"><div class="icon"></div><div class="name">README.md</div></div>
      <div class="footer-space"></div>
    </div>
  </div>
</body>
</html>
